<!DOCTYPE html>
<!-- Dashboard v2 redesign -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clew API — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e16; --bg2: #16161f; --bg3: #1e1e2d;
  --fg: #e8e8ed; --fg2: #a0a0b8; --fg3: #6a6a82;
  --accent: #a855f7; --accent2: #c084fc; --accent-glow: rgba(168,85,247,.12);
  --cyan: #06b6d4; --cyan-dim: rgba(6,182,212,.1);
  --purple-dim: #2d0a4e; --line: #2a2a3a;
  --radius: 12px; --radius-sm: 8px;
  --red: #ef4444; --green: #22c55e; --yellow: #f59e0b; --orange: #f97316;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--bg); color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
@keyframes shimmer { 0%{opacity:.4} 50%{opacity:.8} 100%{opacity:.4} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse-dot { 0%{box-shadow:0 0 0 0 var(--dot-color,rgba(34,197,94,.4))} 70%{box-shadow:0 0 0 6px var(--dot-color,rgba(34,197,94,0))} 100%{box-shadow:0 0 0 0 var(--dot-color,rgba(34,197,94,0))} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes gradientOrb { 0%{transform:translate(-50%,-50%) rotate(0deg) scale(1)} 50%{transform:translate(-30%,-40%) rotate(180deg) scale(1.2)} 100%{transform:translate(-50%,-50%) rotate(360deg) scale(1)} }
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 250px; background: var(--bg2); border-right: 1px solid var(--line);
  padding: 1.5rem 1rem; display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.2rem; color: var(--accent); margin-bottom: 2rem; text-decoration: none; display: block; }
.sidebar .logo span { color: var(--fg); }
.sidebar nav { display: flex; flex-direction: column; gap: .25rem; flex: 1; }
.sidebar nav a {
  color: var(--fg2); text-decoration: none; padding: .5rem .75rem;
  border-radius: var(--radius); font-size: .9rem; transition: .15s;
}
.sidebar nav a:hover { background: var(--bg3); color: var(--fg); }
.sidebar nav a.active { background: var(--purple-dim); color: var(--accent); font-weight: 500; }
.user-info { padding-top: 1rem; border-top: 1px solid var(--line); }
.user-info .name { font-size: .8rem; margin-bottom: .25rem; }

.main { flex: 1; padding: 2rem; overflow-x: auto; }
.page-header { margin-bottom: 1.5rem; }
.page-header h1 { font-size: 1.5rem; font-weight: 600; }
.page-header p { color: var(--fg2); font-size: .9rem; margin-top: .2rem; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius); padding: 1rem; }
.stat-card .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--fg3); margin-bottom: .35rem; }
.stat-card .value { font-size: 1.5rem; font-weight: 600; }

.card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 1.5rem; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1rem 0; }
.card-header h3 { font-size: 1rem; font-weight: 600; }
.card table { width: 100%; border-collapse: collapse; margin-top: .75rem; }
.card th, .card td { text-align: left; padding: .6rem .8rem; font-size: .85rem; border-bottom: 1px solid var(--line); }
.card th { color: var(--fg3); font-weight: 500; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
.card td { font-size: .85rem; }

.tag { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; vertical-align: middle; }
.tag-free { background: var(--bg3); color: var(--fg2); }
.tag-pro { background: var(--purple-dim); color: var(--accent); }
.tag-enterprise { background: rgba(245,158,11,.15); color: var(--yellow); }
.tag-active { background: rgba(34,197,94,.15); color: var(--green); }
.tag-revoked { background: rgba(239,68,68,.15); color: var(--red); }
.tag-openai { background: rgba(0,200,150,.15); color: #00c896; }
.tag-groq { background: rgba(242,100,50,.15); color: #f26432; }
.tag-nvidia { background: rgba(118,185,0,.15); color: #76b900; }
.tag-deepseek { background: rgba(130,90,255,.15); color: #825aff; }
.tag-mistral { background: rgba(255,210,0,.15); color: #ffd200; }
.tag-openrouter { background: rgba(130,180,255,.15); color: #82b4ff; }
.tag-opencode { background: rgba(0,200,255,.15); color: #00c8ff; }
.tag-minimax { background: rgba(255,100,150,.15); color: #ff6496; }
.tag-mimo { background: rgba(255,130,0,.15); color: #ff8200; }
.tag-google { background: rgba(66,133,244,.15); color: #4285f4; }
.tag-siliconflow { background: rgba(0,180,255,.15); color: #00b4ff; }
.tag-zhipu { background: rgba(255,80,80,.15); color: #ff5050; }
.tag-qwen { background: rgba(255,180,0,.15); color: #ffb400; }

.btn { display: inline-flex; align-items: center; gap: .35rem; padding: .5rem 1rem; border: 1px solid var(--line); border-radius: var(--radius); background: var(--bg3); color: var(--fg); cursor: pointer; font-size: .85rem; font-family: inherit; transition: .15s; }
.btn:hover { background: rgba(255,255,255,.08); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-sm { padding: .3rem .6rem; font-size: .78rem; }
.btn-danger { background: rgba(239,68,68,.15); border-color: transparent; color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,.25); }

input, select { font-family: inherit; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: .8rem; color: var(--fg2); margin-bottom: .3rem; }
.form-group input { width: 100%; padding: .6rem; background: var(--bg3); color: var(--fg); border: 1px solid var(--line); border-radius: var(--radius); font-size: .9rem; }

.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-box { background: var(--bg2); border: 1px solid var(--line); border-radius: 12px; padding: 2.5rem; width: 380px; }
.term-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--line); }
.term-dot { width: 10px; height: 10px; border-radius: 50%; }
.term-dot:nth-child(1) { background: #ef4444; } .term-dot:nth-child(2) { background: #f59e0b; } .term-dot:nth-child(3) { background: #22c55e; }
.term-label { margin-left: auto; font-size: .7rem; color: var(--fg3); font-family: var(--mono); }
.login-box .logo { font-family: var(--mono); font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: .25rem; }
.login-box h2 { font-size: 1.2rem; margin-bottom: .15rem; font-weight: 600; }
.sub { color: var(--fg2); font-size: .85rem; margin-bottom: 1.5rem; }
.error { color: var(--red); font-size: .85rem; margin-bottom: .75rem; display: none; }
.switch { margin-top: 1rem; text-align: center; font-size: .85rem; color: var(--fg2); }
.switch a { color: var(--accent); cursor: pointer; }

#toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: .75rem 1.2rem; border-radius: var(--radius); font-size: .85rem; z-index: 100; transition: .3s; opacity: 0; pointer-events: none; }
#toast.show { opacity: 1; }

/* Admin tabs */
.admin-tabs { display: flex; gap: .25rem; margin-bottom: 1rem; flex-wrap: wrap; }
.admin-tab { padding: .5rem 1rem; border: 1px solid var(--line); border-radius: var(--radius); background: var(--bg3); color: var(--fg2); cursor: pointer; font-size: .82rem; transition: .15s; }
.admin-tab:hover { background: var(--purple-dim); color: var(--accent); }
.admin-tab.active { background: var(--purple-dim); color: var(--accent); border-color: var(--accent); }
.admin-section { display: none; }
.admin-section.active { display: block; }

/* Dashboard overview */
.dash-bg { position:relative; }
.dash-bg::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 600px 400px at 20% 30%,rgba(168,85,247,.06),transparent),radial-gradient(ellipse 400px 300px at 80% 60%,rgba(6,182,212,.04),transparent); pointer-events:none; }
.dash-grid { position:relative; z-index:1; }
.stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; margin-bottom:1.5rem; position:relative; z-index:2; }
.dash-card { background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius); padding:1.25rem; position:relative; overflow:hidden; transition:.3s; animation:slideUp .5s ease backwards; }
.dash-card:nth-child(1) { animation-delay:.05s; }
.dash-card:nth-child(2) { animation-delay:.12s; }
.dash-card:nth-child(3) { animation-delay:.19s; }
.dash-card:nth-child(4) { animation-delay:.26s; }
.dash-card:hover { border-color:rgba(168,85,247,.3); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.3); }
.dash-card .icon { font-size:1.3rem; margin-bottom:.4rem; display:block; }
.dash-card .stat-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--fg3); margin-bottom:.2rem; }
.dash-card .stat-val { font-family:var(--mono); font-size:1.6rem; font-weight:700; line-height:1.2; }
.dash-card .stat-sub { font-size:.72rem; color:var(--fg3); margin-top:.15rem; }
.dash-card .stat-trend { position:absolute; bottom:.75rem; right:1rem; display:flex; gap:2px; align-items:end; height:24px; }
.dash-card .stat-trend span { width:3px; border-radius:2px; background:var(--accent); opacity:.4; transition:.3s; }
.dash-card:hover .stat-trend span { opacity:.7; }
.dash-card .glow-edge { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0; transition:.5s; }
.dash-card:hover .glow-edge { opacity:1; }

.provider-strip { display:flex; gap:.75rem; overflow-x:auto; padding:.25rem 0 .75rem; position:relative; z-index:2; }
.prov-item { display:flex; align-items:center; gap:.4rem; padding:.25rem .6rem; background:var(--bg3); border:1px solid var(--line); border-radius:20px; font-size:.7rem; color:var(--fg2); white-space:nowrap; transition:.2s; cursor:default; }
.prov-item:hover { border-color:rgba(168,85,247,.2); background:var(--bg2); }
.prov-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

.quick-actions { display:flex; gap:.75rem; margin-bottom:1.5rem; flex-wrap:wrap; position:relative; z-index:2; }
.qa-btn { display:inline-flex; align-items:center; gap:.45rem; padding:.45rem .9rem; background:var(--bg3); border:1px solid var(--line); border-radius:var(--radius-sm); color:var(--fg2); font-size:.78rem; cursor:pointer; transition:.2s; text-decoration:none; }
.qa-btn:hover { background:var(--accent-glow); border-color:rgba(168,85,247,.3); color:var(--fg); }

.chart-wrap { position:relative; z-index:2; background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius); padding:1.25rem; margin-bottom:1.5rem; animation:slideUp .5s ease .22s backwards; }
.chart-wrap .chart-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.chart-wrap .chart-hdr h3 { font-size:.9rem; font-weight:600; }
.chart-wrap .chart-hdr span { font-size:.7rem; color:var(--fg3); }
.chart-wrap svg { display:block; width:100%; height:auto; }

.activity-feed { position:relative; z-index:2; background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius); padding:1.25rem; animation:slideUp .5s ease .32s backwards; }
.activity-feed .feed-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:.75rem; }
.activity-feed .feed-hdr h3 { font-size:.9rem; font-weight:600; }
.feed-item { display:flex; align-items:center; gap:.75rem; padding:.5rem 0; border-bottom:1px solid var(--line); font-size:.8rem; }
.feed-item:last-child { border-bottom:none; }
.feed-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.feed-model { font-family:var(--mono); font-size:.72rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.feed-time { color:var(--fg3); font-size:.68rem; flex-shrink:0; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const STATE = { user: null, token: localStorage.getItem('clew_session_token') || null, keys: [], models: [], page: 'login', adminTab: 'overview' };

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (STATE.token) headers['Authorization'] = 'Bearer ' + STATE.token;
  const res = await fetch('https://api.clew-code.org' + path, { ...opts, headers });
  if (res.status === 401) { STATE.token = null; localStorage.removeItem('clew_session_token'); render(); }
  return res.json();
}

function fmt(n) { if (n === undefined || n === null) return '—'; if (n >= 1e12) return (n/1e12).toFixed(1)+'T'; if (n >= 1e9) return (n/1e9).toFixed(1)+'B'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return n.toLocaleString(); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg; el.style.background = type === 'success' ? 'rgba(34,197,94,.9)' : type === 'error' ? 'rgba(239,68,68,.9)' : 'rgba(26,26,40,.95)'; el.style.color = '#fff'; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function init() {
  // Handle Google OAuth callback (#token=xxx)
  const hash = location.hash.slice(1);
  if (hash.startsWith('token=')) {
    STATE.token = hash.slice(6);
    localStorage.setItem('clew_session_token', STATE.token);
    location.hash = 'overview';
  }
  if (!STATE.token) { render(); return; }
  try {
    const d = await api('/v1/auth/me');
    if (d.user) { STATE.user = d.user; render(); }
    else { STATE.token = null; localStorage.removeItem('clew_session_token'); render(); }
  } catch { STATE.token = null; localStorage.removeItem('clew_session_token'); render(); }
}

function render() {
  if (!STATE.token || !STATE.user) { document.getElementById('app').innerHTML = loginPage(); setupAuth(); return; }

  const hash = (location.hash || '#overview').slice(1);
  STATE.page = hash;

  const pages = { overview, keys, usage, billing, settings, admin, instances, events, projects, orgs, byok, models, media };
  const content = (pages[hash] || overview)();
  document.getElementById('app').innerHTML = '<div class="app">' + sidebar() + content + '</div><div id="toast"></div>';

  if (hash === 'overview') loadOverview();
  if (hash === 'keys') loadKeys();
  if (hash === 'usage') loadUsage();
  if (hash === 'instances') loadInstances();
  if (hash === 'events') loadEvents();
  if (hash === 'admin') loadAdmin();
  if (hash === 'projects') loadProjects();
  if (hash === 'orgs') loadOrgs();
  if (hash === 'billing') loadBilling();
  if (hash === 'byok') loadByok();
  if (hash === 'models') loadModels();
  if (hash === 'media') loadMedia();
  if (hash === 'settings') loadSettings();
}

function sidebar() {
  const links = [
    { h: 'overview', l: 'Dashboard' }, { h: 'orgs', l: 'Organizations' },
    { h: 'projects', l: 'Projects' }, { h: 'keys', l: 'API Keys' },
    { h: 'models', l: 'Models' }, { h: 'media', l: 'Media' }, { h: 'usage', l: 'Usage' }, { h: 'billing', l: 'Billing' }, { h: 'byok', l: 'My Keys' },
    { h: 'settings', l: 'Settings' },
  ];
  const adminLinks = (STATE.user?.tier === 'enterprise')
    ? [{ h: 'admin', l: 'Admin' }, { h: 'instances', l: 'Instances' }, { h: 'events', l: 'Events' }]
    : [];
  links.push(...adminLinks);
  return '<div class="sidebar"><a href="#" class="logo" onclick="location.hash=\'overview\'">clew<span>api</span></a><nav>' +
    links.map(l => '<a href="#' + l.h + '" class="' + (STATE.page === l.h ? 'active' : '') + '">' + l.l + '</a>').join('') +
    '</nav><div class="user-info"><div class="name">' + STATE.user.email + '</div><span class="tag tag-' + STATE.user.tier + '">' + STATE.user.tier.toUpperCase() + '</span></div></div>';
}

// ============ LOGIN ============

function loginPage() {
  return '<div class="login-page"><div class="login-box">' +
    '<div class="term-bar"><span class="term-dot"></span><span class="term-dot"></span><span class="term-dot"></span><span class="term-label">clew-api</span></div>' +
    '<div class="logo">clew<span style="color:var(--fg)">api</span></div><h2 id="auth-title">Sign in</h2>' +
    '<p class="sub" id="auth-sub">Access your Clew API dashboard</p>' +
    '<div class="error" id="auth-error"></div>' +
    '<form id="auth-form" onsubmit="return false">' +
    '<div class="form-group"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" required></div>' +
    '<div class="form-group"><label>Password</label><input type="password" id="auth-password" placeholder="Enter password" required></div>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center" id="auth-btn">Sign in</button></form>' +
    '<div style="display:flex;align-items:center;gap:.5rem;margin:.8rem 0"><hr style="flex:1;border:none;border-top:1px solid var(--line)"><span style="color:var(--fg3);font-size:.75rem">OR</span><hr style="flex:1;border:none;border-top:1px solid var(--line)"></div>' +
    '<button class="btn" style="width:100%;justify-content:center;gap:.5rem" onclick="window.location.href=\'https://api.clew-code.org/v1/auth/google/login\'">' +
    '<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H42V20H24v8h11.3c-1.1 3-3.3 5.5-6.2 7.1l-.1 0 6.2 4.8c3.6-3.3 5.7-8.2 5.7-13.9 0-1.3-.1-2.7-.3-4z"/><path fill="#FF3D00" d="M10.5 28.4l-.3.2 6.2 4.8c1.8-3.6 5.1-6.4 9.1-7.4l0-.1c-1-1-2.2-2-3.7-2.8-1.5-.8-3.2-1.3-5-1.5-3.9-.4-7.4 1.3-9.3 3.9z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.6-1.7 12.8-4.6l-6.2-4.8c-2 1.4-4.5 2.2-6.6 2.2-4.1 0-7.6-2.3-9.3-5.6l-6.3 4.9C11.9 39.8 17.4 44 24 44z"/><path fill="#1976D2" d="M24 14c3.6 0 6.9 1.3 9.4 3.7l5.1-5.1C34.7 8.7 29.7 6 24 6 17.4 6 11.9 10.2 8.5 15.8l6.3 4.9c1.7-3.3 5.2-5.6 9.3-5.6z"/></svg>' +
    'Sign in with Google</button>' +
    '<div class="switch"><span id="auth-switch-text">Don\'t have an account? </span><a id="auth-switch-link">Sign up</a></div></div></div>';
}

function setupAuth() {
  let mode = 'login';
  const title = document.getElementById('auth-title');
  const sub = document.getElementById('auth-sub');
  const btn = document.getElementById('auth-btn');
  const error = document.getElementById('auth-error');
  const switchLink = document.getElementById('auth-switch-link');
  const switchText = document.getElementById('auth-switch-text');

  switchLink.onclick = () => {
    mode = mode === 'login' ? 'signup' : 'login';
    title.textContent = mode === 'login' ? 'Sign in' : 'Create account';
    sub.textContent = mode === 'login' ? 'Access your Clew API dashboard' : 'Start building with Clew API';
    btn.textContent = mode === 'login' ? 'Sign in' : 'Create account';
    switchText.textContent = mode === 'login' ? 'Don\'t have an account? ' : 'Already have an account? ';
    switchLink.textContent = mode === 'login' ? 'Sign up' : 'Sign in';
    error.style.display = 'none';
  };

  document.getElementById('auth-form').onsubmit = async () => {
    error.style.display = 'none';
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    if (!email || !password) { error.textContent = 'Email and password required'; error.style.display = 'block'; return; }
    try {
      const d = await api('/v1/auth/' + (mode === 'login' ? 'login' : 'signup'), { method: 'POST', body: JSON.stringify({ email, password }) });
      if (d.token) {
        STATE.token = d.token; STATE.user = d.user;
        localStorage.setItem('clew_session_token', d.token);
        render();
      } else { error.textContent = d.error || 'Failed'; error.style.display = 'block'; }
    } catch (e) { error.textContent = e.message; error.style.display = 'block'; }
  };
}

// ============ OVERVIEW ============

function overview() {
  return '<div class="main dash-bg">' +
    '<div class="page-header"><h1>Welcome back</h1><p style="color:var(--fg2);font-size:.9rem">' + esc(STATE.user.email) + ' · <span class="tag tag-' + STATE.user.tier + '">' + STATE.user.tier.toUpperCase() + '</span></p></div>' +
    '<div class="dash-grid">' +
    '<div class="stat-row">' +
    '<div class="dash-card" id="card-1"><div class="glow-edge"></div><span class="icon">▣</span><div class="stat-label">Total Tokens</div><div class="stat-val" id="stat-tokens" style="color:var(--accent)">—</div><div class="stat-sub">lifetime usage</div><div class="stat-trend" id="trend-tokens"></div></div>' +

async function loadOverview() {
  try {
    const [u, keys] = await Promise.all([
      api('/v1/usage'), api('/v1/keys'),
    ]);
    const stats = u.stats || u;
    const activeKeyCount = (keys.keys || []).filter((k) => k.active).length;

    // Animate stat values
    animateVal('stat-tokens', fmt(stats.total_tokens || stats.total_usage || 0));
    animateVal('stat-cost', '$' + (stats.total_cost || 0).toFixed(4));
    animateVal('stat-requests', fmt(stats.total_requests || 0));
    animateVal('stat-keys', fmt(activeKeyCount));

    // Trend micro-bars
    const days = stats.daily || u.daily || [];
    trendBars('trend-tokens', days.map((d) => d.tokens || d.total_tokens || 0), 'var(--accent)');
    trendBars('trend-cost', days.map((d) => d.cost || d.total_cost || 0), 'var(--cyan)');
    trendBars('trend-reqs', days.map((d) => d.requests || 0), 'var(--green)');
    trendBars('trend-keys', [activeKeyCount], 'var(--yellow)');

    // Provider status strip
    const providers = [
      { id:'deepseek', label:'DeepSeek', color:'#825aff' },
      { id:'groq', label:'Groq', color:'#f26432' },
      { id:'nvidia', label:'NVIDIA', color:'#76b900' },
      { id:'mistral', label:'Mistral', color:'#ffd200' },
      { id:'minimax', label:'MiniMax', color:'#ff6496' },
      { id:'mimo', label:'MiMo', color:'#ff8200' },
      { id:'siliconflow', label:'SiliconFlow', color:'#00b4ff' },
      { id:'zhipu', label:'Zhipu', color:'#ff5050' },
      { id:'qwen', label:'Qwen', color:'#ffb400' },
      { id:'openai', label:'OpenAI', color:'#00c896' },
    ];
    const provStrip = document.getElementById('prov-strip');
    if (provStrip) {
      const byProvider = (u.by_provider || []);
      provStrip.innerHTML = providers.map(p => {
        const used = byProvider.find((b) => b.provider === p.id);
        return '<div class="prov-item" title="' + p.label + ': ' + fmt(used?.total_tokens || 0) + ' tokens"><span class="prov-dot" style="background:' + p.color + ';box-shadow:0 0 4px ' + p.color + '"></span>' + p.label + '</div>';
      }).join('');
    }

    // SVG area chart
    const chart = document.getElementById('usage-chart');
    if (chart && days.length > 0) {
      const vals = days.map((d) => d.tokens || d.total_tokens || 0);
      const mx = Math.max(...vals, 1);
      const w = 340, h = 80;
      const pts = vals.map((v, i) => {
        const x = (i / (vals.length - 1 || 1)) * w;
        const y = h - (v / mx) * (h - 4) - 2;
        return x + ',' + y;
      });
      const poly = '0,' + h + ' ' + pts.join(' ') + ' ' + w + ',' + h;
      const line = pts.join(' ');
      chart.innerHTML =
        '<defs><linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".4"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>' +
        '<polygon points="' + poly + '" fill="url(#area-grad)" opacity="0.9"/>' +
        '<polyline points="' + line + '" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>';
      // Day labels below chart
      const labels = document.createElement('div');
      labels.style.cssText = 'display:flex;justify-content:space-between;margin-top:6px;font-size:.6rem;color:var(--fg3);font-family:var(--mono)';
      days.forEach((d) => {
        const span = document.createElement('span');
        span.textContent = (d.day || '').slice(5) || '—';
        labels.appendChild(span);
      });
      chart.parentElement?.appendChild(labels);
    }

    // Recent activity (from usage by_provider)
    const feed = document.getElementById('feed-list');
    if (feed) {
      const acts = (u.by_provider || []).slice(0, 6);
      if (acts.length) {
        const colors = { deepseek:'#825aff', groq:'#f26432', nvidia:'#76b900', mistral:'#ffd200', minimax:'#ff6496', mimo:'#ff8200', siliconflow:'#00b4ff', zhipu:'#ff5050', qwen:'#ffb400', openai:'#00c896' };
        feed.innerHTML = acts.map((a) =>
          '<div class="feed-item"><span class="feed-dot" style="background:' + (colors[a.provider] || 'var(--fg3)') + '"></span>' +
          '<span class="feed-model">' + a.provider + '</span>' +
          '<span style="color:var(--fg2)">' + fmt(a.total_tokens || 0) + ' tokens</span>' +
          '<span class="feed-time">' + fmt(a.request_count || 0) + ' req</span></div>'
        ).join('');
      } else {
        feed.innerHTML = '<div style="color:var(--fg3);font-size:.82rem;padding:.5rem 0">No activity yet. Start using the API!</div>';
      }
    }
  } catch {}
}

function animateVal(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
}

function trendBars(id, vals, color) {
  const el = document.getElementById(id);
  if (!el || !vals.length) return;
  const mx = Math.max(...vals, 1);
  el.innerHTML = vals.slice(-7).map(v => {
    const h = Math.max(3, (v / mx) * 22);
    return '<span style="height:' + h + 'px;background:' + color + '"></span>';
  }).join('');
}

async function loadKeys() {

    if (!keys.length) { tbody.innerHTML = '<tr><td colspan="7" style="color:var(--fg3);text-align:center;padding:1rem">No keys yet</td></tr>'; return; }

async function createKeyWithCap() {
  const name = prompt('Key name:') || 'default';
  const cap = prompt('Monthly token cap (leave empty for unlimited):');
  const monthly_cap = cap ? parseInt(cap) : undefined;
  try {
    const d = await api('/v1/keys', { method: 'POST', body: JSON.stringify({ name, monthly_cap }) });
    if (d.key) {
      toast('Copy your key: ' + d.key, 'success');
      loadKeys();
    } else toast(d.error || 'Failed', 'error');
  } catch (e) { toast(e.message, 'error'); }
}

async function revokeKey(id) {
  if (!confirm('Revoke this key?')) return;
  try { await api('/v1/keys/' + id, { method: 'DELETE' }); toast('Revoked', 'success'); loadKeys(); }
  catch (e) { toast(e.message, 'error'); }
}

async function addByokKey() {
  const provider = document.getElementById('byok-provider').value;
  const key = document.getElementById('byok-key').value;
  if (!key) { toast('Enter an API key', 'error'); return; }
  try {
    const d = await api('/v1/byok', { method: 'POST', body: JSON.stringify({ provider, key }) });
    if (d.ok) { toast('Key added!', 'success'); document.getElementById('byok-key').value = ''; loadByok(); }
    else toast(d.error || 'Failed', 'error');
  } catch (e) { toast(e.message, 'error'); }

async function deleteByokKey(id) {
  if (!confirm('Remove this key?')) return;
  try { await api('/v1/byok/' + id, { method: 'DELETE' }); toast('Removed', 'success'); loadByok(); }

async function loadModels() {
  try {
    const d = await api('/v1/models');
    STATE.models = d.data || d.models || [];
    const models = STATE.models;
    const providers = [...new Set(models.map(m => m.provider))].sort();
    const sel = document.getElementById('model-provider-filter');
    if (sel) {
      sel.innerHTML = '<option value="">All Providers</option>' +
        providers.map(p => '<option value="' + p + '">' + p.charAt(0).toUpperCase() + p.slice(1) + '</option>').join('');
    }
    const header = document.querySelector('.card-header h3');
    if (header) header.textContent = 'All Models (' + models.length + ')';
    filterModels();
  } catch {}
}

function filterModels() {
  const q = (document.getElementById('model-search')?.value || '').toLowerCase();
  const prov = document.getElementById('model-provider-filter')?.value || '';
  const models = STATE.models || [];
  const filtered = models.filter(m =>
    (m.id.toLowerCase().includes(q)) &&
    (!prov || m.provider === prov)
  );
  const tbody = document.getElementById('models-table');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--fg3);text-align:center;padding:1rem">No models match your search</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(m =>
    '<tr><td style="font-family:var(--mono);font-size:.85rem">' + m.id + '</td>' +
    '<td><span class="tag tag-' + m.provider + '">' + m.provider + '</span></td>' +
    '<td>' + (m.context ? (m.context >= 1000000 ? (m.context / 1000000).toFixed(0) + 'M' : (m.context / 1000).toFixed(0) + 'K') : '—') + '</td>' +
    '<td>' + (m.pricing ? m.pricing.split('/')[0] || '—' : (m.inputCost ? '$' + m.inputCost : '—')) + '</td>' +
    '<td>' + (m.pricing ? m.pricing.split('/')[1] || '—' : (m.outputCost ? '$' + m.outputCost : '—')) + '</td></tr>'
  ).join('');
}

async function saveSettings() {
  const model = (document.getElementById('pref-model'))?.value || '';
  const providers = (document.getElementById('pref-providers'))?.value || '';
  const telemetry = (document.getElementById('pref-telemetry'))?.checked || false;
  const preferred_providers = providers.split(',').map((s) => s.trim()).filter(Boolean);
  try {
    await api('/v1/user/settings', {
      method: 'PUT',
      body: JSON.stringify({ default_model: model, preferred_providers, telemetry_enabled: telemetry }),
    });
    toast('Settings saved!', 'success');
  } catch { toast('Failed to save', 'error'); }
}

function logout() {
  STATE.token = null; STATE.user = null;
  localStorage.removeItem('clew_session_token');

}

const ALL_PROVIDERS = ['openai', 'deepseek', 'groq', 'mistral', 'nvidia', 'minimax', 'mimo', 'siliconflow', 'zhipu', 'qwen'];

function switchAdminTab(tab) {
  STATE.adminTab = tab;
  const hash = location.hash || '#admin';
  location.hash = hash;
  // Re-render just the admin area
  loadAdmin();
}

async function loadAdmin() {
  try {
    // Overview tab
    const [s, u, pk] = await Promise.all([
      api('/v1/telemetry/stats'),
      api('/v1/admin/users'),
      api('/v1/admin/provider-keys'),
    ]);
    document.getElementById('admin-active').textContent = fmt(s.active_1d);
    document.getElementById('admin-users').textContent = fmt((u.users || []).length);
    document.getElementById('admin-events').textContent = fmt(s.total_events);

    const pt = document.getElementById('admin-providers');
    const providers = pk.providers || {};
    pt.innerHTML = Object.entries(providers).map(([name, info]) =>
      '<tr><td style="font-weight:600">' + name + '</td>' +
      '<td><span class="tag ' + (info.set ? 'tag-active' : 'tag-revoked') + '">' + (info.set ? (info.poolSize > 0 ? info.poolSize + ' keys' : 'Set') : 'Not set') + '</span></td>' +
      '<td>' + (info.set ? '<button class="btn btn-sm" onclick="switchAdminTab(\'poolkeys\')">Manage</button>' : '<button class="btn btn-primary btn-sm" onclick="switchAdminTab(\'poolkeys\')">Add Key</button>') + '</td></tr>'
    ).join('');

    const ut = document.getElementById('admin-users-table');
    const users = u.users || [];
    ut.innerHTML = users.map(u2 =>
      '<tr><td>' + esc(u2.email) + '</td>' +
      '<td><span class="tag tag-' + u2.tier + '">' + u2.tier.toUpperCase() + '</span></td>' +
      '<td>' + fmt(u2.total_tokens_used || 0) + '</td>' +
      '<td>' + (u2.key_count || 0) + '</td>' +
      '<td style="font-size:.8rem;color:var(--fg2)">' + (u2.created_at ? new Date(u2.created_at).toLocaleDateString() : '') + '</td>' +
      '<td>' + (u2.tier !== 'enterprise' ? '<button class="btn btn-sm" onclick="upgradeUser(\'' + u2.id + '\',\'' + u2.tier + '\')">Upgrade</button>' : '') + '</td></tr>'
    ).join('');

    const vt = document.getElementById('admin-versions');
    const versions = s.version_distribution || [];
    vt.innerHTML = versions.length ? versions.map((v) => '<tr><td>' + esc(v.version) + '</td><td>' + fmt(v.count) + '</td></tr>').join('') : '<tr><td colspan="2" style="color:var(--fg3);text-align:center;padding:1rem">No instances</td></tr>';

    // Load tab-specific data
    if (STATE.adminTab === 'poolkeys') loadPoolKeys();
    if (STATE.adminTab === 'usage') loadAdminUsage();
    if (STATE.adminTab === 'byok') loadAdminByok();
    if (STATE.adminTab === 'config') loadAdminConfig();

  } catch {}
}

async function loadPoolKeys() {
  try {
    const pk = await api('/v1/admin/provider-keys');
    const providers = pk.providers || {};
    const tbody = document.getElementById('pool-table');
    tbody.innerHTML = Object.entries(providers).map(([name, info]) =>
      '<tr><td style="font-weight:600">' + name + '</td>' +
      '<td>' + (info.poolSize || 0) + ' keys</td>' +
      '<td>' +
      '<button class="btn btn-sm" onclick="viewPoolKeys(\'' + name + '\')" style="margin-right:.3rem">View</button>' +
      '<button class="btn btn-danger btn-sm" onclick="clearPoolKeys(\'' + name + '\')">Clear</button></td></tr>'
    ).join('');
  } catch {}
}

async function viewPoolKeys(provider) {
  try {
    const d = await api('/v1/admin/pool-keys/' + provider);
    const keys = d.keys || [];
    const msg = keys.map((k, i) => (i + 1) + '. ' + k.prefix).join('\n');
    alert('Pool keys for ' + provider + ' (' + keys.length + '):\n\n' + msg);
  } catch (e) { toast('Failed to load', 'error'); }
}

async function addPoolKey() {
  const provider = document.getElementById('pool-provider').value;
  const key = document.getElementById('pool-key-input').value;
  if (!key) { toast('Enter a key', 'error'); return; }
  try {
    const d = await api('/v1/admin/provider-keys', { method: 'POST', body: JSON.stringify({ provider, key }) });
    if (d.ok) { toast('Key added! Pool: ' + d.poolSize, 'success'); document.getElementById('pool-key-input').value = ''; loadPoolKeys(); }
    else toast(d.error || 'Failed', 'error');
  } catch (e) { toast(e.message, 'error'); }
}

async function clearPoolKeys(provider) {
  if (!confirm('Delete ALL pool keys for ' + provider + '?')) return;
  try {
    await api('/v1/admin/pool-keys/' + provider, { method: 'DELETE' });
    toast('Pool cleared', 'success');
    loadPoolKeys();
  } catch (e) { toast(e.message, 'error'); }
}

// ============ ADMIN: USAGE ============

async function loadAdminUsage() {
  try {
    const d = await api('/v1/admin/usage');
    const byProvider = d.byProvider || [];

    const tbody = document.getElementById('admin-usage-table');
    tbody.innerHTML = byProvider.length ? byProvider.map((p) =>
      '<tr><td><span class="tag tag-' + p.provider + '">' + p.provider + '</span></td>' +
      '<td>' + fmt(p.requests || 0) + '</td>' +
      '<td>' + fmt(p.pt || 0) + '</td>' +
      '<td>' + fmt(p.ct || 0) + '</td>' +
      '<td>$' + (p.cost || 0).toFixed(4) + '</td>' +
      '<td>' + (p.users || 0) + '</td></tr>'
    ).join('') : '<tr><td colspan="6" style="color:var(--fg3);text-align:center;padding:1rem">No usage data</td></tr>';

    const daily = d.daily || [];
    const chart = document.getElementById('admin-usage-chart');
    if (!daily.length) { chart.innerHTML = '<span style="color:var(--fg3)">No data</span>'; return; }
    const max = Math.max(...daily.map((d) => d.tokens || 1));
    chart.innerHTML = daily.map((d) => {
      const v = d.tokens || 0;
      const pct = max > 0 ? (v / max * 100) : 0;
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px" title="' + d.provider + ' ' + d.day + ': ' + fmt(v) + '">' +
        '<div style="width:100%;background:linear-gradient(to top,var(--purple-dim),var(--accent));border-radius:4px 4px 0 0;height:' + pct + '%;min-height:4px"></div>' +
        '<span style="font-size:.55rem;color:var(--fg3)">' + (d.day || '').slice(5) + '</span></div>';
    }).join('');
  } catch {}
}

async function setProviderKey(provider) {
  const key = prompt('Enter API key for ' + provider + ':');
  if (!key) return;
  try {
    await api('/v1/admin/provider-keys', { method: 'POST', body: JSON.stringify({ provider, key }) });
    toast(provider + ' key set!', 'success');

async function upgradeUser(userId, currentTier) {
  const tiers = ['free', 'pro', 'enterprise'];
  const next = tiers.indexOf(currentTier) + 1;
  if (next >= tiers.length) { toast('Already at max tier', 'error'); return; }
  const newTier = tiers[next];
  if (!confirm('Upgrade user to ' + newTier + '?')) return;
  try {
    await api('/v1/admin/users/' + userId, { method: 'PATCH', body: JSON.stringify({ tier: newTier }) });
    toast('Upgraded to ' + newTier, 'success');
    loadAdmin();
  } catch (e) { toast(e.message, 'error'); }
}

      '<div><span class="tag tag-enterprise">Owner</span></div></div>' +
      '<p style="padding:0 1rem 1rem;color:var(--fg2);font-size:.85rem">ID: ' + esc(o.id) + ' · Members: ' + o.member_count +
      ' · Your role: <span class="tag tag-enterprise">' + o.my_role?.toUpperCase() + '</span></p></div>'
    ).join('');
    // Load members for each org
    for (const o of orgs) {
      try {
        const m = await api('/v1/orgs/' + o.id + '/members');
        const card = list.querySelector('[data-org="' + o.id + '"]') || document.createElement('div');
        // Inline...
      } catch {}
    }
  } catch {}
}

async function createOrg() {
  const name = prompt('Organization name:');
  if (!name) return;
  try {
    const d = await api('/v1/orgs', { method: 'POST', body: JSON.stringify({ name }) });
    if (d.ok) { toast('Created', 'success'); loadOrgs(); }
    else toast(d.error || 'Failed', 'error');
  } catch (e) { toast(e.message, 'error'); }
}

init();
