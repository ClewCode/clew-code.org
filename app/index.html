<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clew API — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a28;
  --fg: #e4e4e7; --fg2: #a1a1aa; --fg3: #6b6b80;
  --accent: #a855f7; --accent2: #c084fc;
  --purple-dim: #3b0764; --line: #27272a;
  --radius: 10px; --red: #ef4444; --green: #22c55e; --yellow: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--bg); color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px; background: var(--bg2); border-right: 1px solid var(--line);
  padding: 1.5rem; display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar .logo { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.2rem; color: var(--accent); margin-bottom: 2rem; text-decoration: none; display: block; }
.sidebar .logo span { color: var(--fg); }
.sidebar nav { display: flex; flex-direction: column; gap: .25rem; flex: 1; }
.sidebar a {
  display: flex; align-items: center; gap: .75rem; padding: .65rem 1rem; border-radius: 8px;
  color: var(--fg2); text-decoration: none; font-size: .9rem; font-weight: 500; transition: all .15s;
}
.sidebar a:hover { background: var(--bg3); color: var(--fg); }
.sidebar a.active { background: rgba(168,85,247,.1); color: var(--accent); }
.sidebar .user-info { padding-top: 1rem; border-top: 1px solid var(--line); margin-top: auto; font-size: .8rem; color: var(--fg3); }
.sidebar .user-info .name { color: var(--fg); font-weight: 600; }

.main { flex: 1; padding: 2rem; overflow-y: auto; max-width: 1100px; }
.page-header { margin-bottom: 2rem; }
.page-header h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; }
.page-header p { color: var(--fg2); font-size: .9rem; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius); padding: 1.25rem; }
.stat-card .label { font-size: .8rem; color: var(--fg2); }
.stat-card .value { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 700; }

.card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.card-header h3 { font-size: .95rem; font-weight: 600; }

.btn {
  display: inline-flex; align-items: center; gap: .5rem; padding: .5rem 1.25rem; border-radius: 8px;
  font-weight: 600; font-size: .85rem; cursor: pointer; border: none; text-decoration: none; transition: all .15s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #9333ea; }
.btn-outline { background: transparent; border: 1px solid var(--line); color: var(--fg); }
.btn-danger { background: var(--red); color: white; }
.btn-sm { padding: .35rem .75rem; font-size: .8rem; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: .8rem; font-weight: 600; color: var(--fg3); padding: .75rem .5rem; border-bottom: 1px solid var(--line); }
td { padding: .75rem .5rem; font-size: .85rem; border-bottom: 1px solid var(--line); }
.mono { font-family: 'JetBrains Mono', monospace; font-size: .8rem; }

.tag { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .7rem; font-weight: 600; }
.tag-free { background: var(--bg3); color: var(--fg2); }
.tag-pro { background: var(--purple-dim); color: var(--accent); }
.tag-enterprise { background: rgba(245,158,11,.15); color: var(--yellow); }
.tag-active { background: rgba(34,197,94,.15); color: var(--green); }
.tag-revoked { background: rgba(239,68,68,.15); color: var(--red); }

input, select {
  width: 100%; padding: .6rem .75rem; background: var(--bg); border: 1px solid var(--line);
  border-radius: 6px; color: var(--fg); font-size: .9rem; outline: none;
}
input:focus { border-color: var(--accent); }
.form-group { margin-bottom: 1rem; }
label { display: block; font-size: .85rem; font-weight: 500; color: var(--fg2); margin-bottom: .35rem; }

.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
.login-box { width: 400px; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--radius); padding: 2.5rem; }
.login-box .term-bar { display: flex; align-items: center; gap: 6px; padding-bottom: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--line); }
.login-box .term-dot { width: 10px; height: 10px; border-radius: 50%; }
.login-box .term-dot:nth-child(1) { background: #ef4444; }
.login-box .term-dot:nth-child(2) { background: #f59e0b; }
.login-box .term-dot:nth-child(3) { background: #22c55e; }
.login-box .term-label { font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--fg3); margin-left: .5rem; }
.login-box .logo { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--accent); text-align: center; }
.login-box h2 { text-align: center; font-size: 1.25rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: .5rem 0 .25rem; }
.login-box .sub { text-align: center; color: var(--fg2); font-size: .85rem; margin-bottom: 2rem; }
.login-box .error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); padding: .75rem; border-radius: 6px; font-size: .85rem; margin-bottom: 1rem; display: none; }
.login-box .error.show { display: block; }
.login-box .switch { text-align: center; font-size: .85rem; color: var(--fg2); margin-top: 1.5rem; }
.login-box .switch a { color: var(--accent); text-decoration: none; cursor: pointer; }

.toast { position: fixed; top: 1rem; right: 1rem; padding: .75rem 1.25rem; border-radius: 8px; font-size: .85rem; z-index: 1000; animation: slideIn .3s; max-width: 400px; display: none; }
.toast-success { background: rgba(34,197,94,.15); border: 1px solid var(--green); color: var(--green); }
.toast-error { background: rgba(239,68,68,.15); border: 1px solid var(--red); color: var(--red); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.plans-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
@media (max-width: 768px) { .sidebar { width: auto; padding: 1rem; } .sidebar a span:last-child { display: none; } .sidebar .user-info { display: none; } }

.chart-bars { display: flex; gap: 3px; align-items: flex-end; height: 120px; padding: .5rem 0; }
.chart-bar { flex: 1; background: linear-gradient(to top, var(--accent), var(--accent2)); border-radius: 3px 3px 0 0; min-height: 2px; opacity: .8; transition: all .2s; cursor: pointer; position: relative; }
.chart-bar:hover { opacity: 1; transform: scaleY(1.05); transform-origin: bottom; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const STATE = { user: null, token: localStorage.getItem('clew_session_token') || null, keys: [], page: 'login' };
const API_BASE = 'https://api.clew-code.org';

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (STATE.token) headers['Authorization'] = 'Bearer ' + STATE.token;
  const res = await fetch(API_BASE + path, { ...opts, headers: { ...headers, ...opts.headers } });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast toast-' + type; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function render() {
  const hash = location.hash.slice(1) || 'overview';
  STATE.page = hash;
  const app = document.getElementById('app');

  // Try to restore session
  const t = localStorage.getItem('clew_session_token');
  if (t && !STATE.user) {
    STATE.token = t;
    try {
      const data = await api('/v1/auth/me');
      STATE.user = data.user;
    } catch {
      STATE.token = null;
      STATE.user = null;
      localStorage.removeItem('clew_session_token');
    }
  }

  if (!STATE.user || hash === 'login') { app.innerHTML = loginPage(); bindLogin(); return; }

  const pages = { overview, keys, usage, billing, settings, admin, instances, events, projects, orgs };
  const content = (pages[hash] || overview)();
  app.innerHTML = '<div class="app">' + sidebar() + content + '</div><div id="toast"></div>';

  // Load real data after page render
  if (hash === 'overview') loadOverview();
  if (hash === 'keys') loadKeys();
  if (hash === 'usage') loadUsage();
  if (hash === 'instances') loadInstances();
  if (hash === 'events') loadEvents();
  if (hash === 'admin') loadAdminStats();
  if (hash === 'projects') loadProjects();
  if (hash === 'orgs') loadOrgs();
}

function sidebar() {
  const links = [
    { h: 'overview', l: 'Dashboard' }, { h: 'orgs', l: 'Organizations' },
    { h: 'projects', l: 'Projects' }, { h: 'keys', l: 'API Keys' },
    { h: 'usage', l: 'Usage' }, { h: 'billing', l: 'Billing' },
    { h: 'settings', l: 'Settings' },
  ];
  const adminLinks = (STATE.user?.role === 'admin' || STATE.user?.tier === 'enterprise')
    ? [{ h: 'admin', l: 'Admin' }, { h: 'instances', l: 'Instances' }, { h: 'events', l: 'Events' }]
    : [];
  links.push(...adminLinks);
  return '<div class="sidebar"><a href="#" class="logo" onclick="location.hash=\'overview\'">clew<span>api</span></a><nav>' +
    links.map(l => '<a href="#' + l.h + '" class="' + (STATE.page === l.h ? 'active' : '') + '">' + l.l + '</a>').join('') +
    '</nav><div class="user-info"><div class="name">' + STATE.user.email + '</div><span class="tag tag-' + STATE.user.tier + '">' + STATE.user.tier.toUpperCase() + '</span></div></div>';
}

function loginPage() {
  return '<div class="login-page"><div class="login-box">' +
    '<div class="term-bar"><span class="term-dot"></span><span class="term-dot"></span><span class="term-dot"></span><span class="term-label">clew-api</span></div>' +
    '<div class="logo">clew<span style="color:var(--fg)">api</span></div><h2 id="auth-title">Sign in</h2>' +
    '<p class="sub" id="auth-sub">Access your Clew API dashboard</p>' +
    '<div class="error" id="auth-error"></div>' +
    '<form id="auth-form" onsubmit="return false">' +
    '<div class="form-group"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" required></div>' +
    '<div class="form-group"><label>Password</label><input type="password" id="auth-password" placeholder="Enter password" required></div>' +
    '<button class="btn btn-primary" style="width:100%;justify-content:center" id="auth-btn">Sign in</button></form>' +
    '<div class="switch"><span id="auth-switch-text">Don\'t have an account? </span><a id="auth-switch-link">Sign up</a></div></div></div>';
}

function bindLogin() {
  let isLogin = true;
  const toggle = () => {
    isLogin = !isLogin;
    document.getElementById('auth-title').textContent = isLogin ? 'Sign in' : 'Create account';
    document.getElementById('auth-btn').textContent = isLogin ? 'Sign in' : 'Create account';
    document.getElementById('auth-switch-text').textContent = isLogin ? "Don't have an account? " : "Already have an account? ";
    document.getElementById('auth-switch-link').textContent = isLogin ? 'Sign up' : 'Sign in';
    document.getElementById('auth-error').classList.remove('show');
  };
  document.getElementById('auth-switch-link').onclick = toggle;
  document.getElementById('auth-form').onsubmit = async () => {
    const err = document.getElementById('auth-error');
    err.classList.remove('show');
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    document.getElementById('auth-btn').disabled = true;
    try {
      const endpoint = isLogin ? '/v1/auth/login' : '/v1/auth/signup';
      const data = await api(endpoint, { method: 'POST', body: JSON.stringify({ email, password }) });
      STATE.token = data.token;
      STATE.user = data.user;
      localStorage.setItem('clew_session_token', data.token);
      window.location.href = '/app/#overview';
    } catch (e) { err.textContent = e.message; err.classList.add('show'); }
    document.getElementById('auth-btn').disabled = false;
  };
}

function overview() {
  return '<div class="main"><div class="page-header"><h1>Dashboard</h1><p>Clew API overview</p></div>' +
    '<div class="stats-grid">' +
    '<div class="stat-card"><div class="label">Requests (30d)</div><div class="value" style="color:var(--accent)" id="stat-requests">—</div></div>' +
    '<div class="stat-card"><div class="label">Tokens Used</div><div class="value" style="color:var(--accent2)" id="stat-tokens">—</div></div>' +
    '<div class="stat-card"><div class="label">Total Cost</div><div class="value" style="color:var(--fg)" id="stat-cost">—</div></div>' +
    '<div class="stat-card"><div class="label">Active Keys</div><div class="value" style="color:var(--fg)" id="stat-keys">—</div></div></div>' +
    '<div class="card"><div class="card-header"><h3>Usage (Last 30 Days)</h3></div>' +
    '<div class="chart-bars" id="usage-chart"><div style="padding:1rem;text-align:center;color:var(--fg3)">Loading...</div></div></div></div>';
}

async function loadOverview() {
  try {
    const usage = await api('/v1/usage');
    const me = await api('/v1/auth/me');
    const sum = usage.summary || {};
    document.getElementById('stat-requests').textContent = sum.total_requests || '0';
    document.getElementById('stat-tokens').textContent = (sum.total_tokens || 0).toLocaleString();
    document.getElementById('stat-cost').textContent = '$' + (sum.total_cost || 0).toFixed(4);
    document.getElementById('stat-keys').textContent = me.user?.active_keys || '0';

    // Real chart data from daily stats
    const daily = await api('/v1/usage/daily?days=30');
    const chart = document.getElementById('usage-chart');
    const maxTokens = Math.max(...daily.chart.map(d => d.tokens), 1);
    chart.innerHTML = daily.chart.map(d => {
      const h = d.tokens > 0 ? Math.max(4, (d.tokens / maxTokens) * 80) : 2;
      const date = new Date(d.date + 'T00:00:00');
      const label = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      return '<div class="chart-bar" style="height:' + h + 'px" title="' + label + ': ' + d.tokens.toLocaleString() + ' tokens, ' + d.requests + ' req"></div>';
    }).join('');
    // Add total under chart
    const totalTokens = daily.chart.reduce((s, d) => s + d.tokens, 0);
    const totalReq = daily.chart.reduce((s, d) => s + d.requests, 0);
    chart.parentElement.innerHTML += '<div style="display:flex;justify-content:space-between;font-size:.8rem;color:var(--fg3);margin-top:.5rem"><span>' + daily.chart[0]?.date?.slice(0,7) + ' — ' + daily.chart[daily.chart.length-1]?.date?.slice(0,10) + '</span><span>' + totalTokens.toLocaleString() + ' tokens total · ' + totalReq + ' requests</span></div>';
  } catch (e) {
    document.getElementById('stat-requests').textContent = '?';
    document.getElementById('stat-tokens').textContent = '?';
    document.getElementById('stat-cost').textContent = '?';
    document.getElementById('stat-keys').textContent = '?';
  }
}

function keys() {
  return '<div class="main"><div class="page-header"><h1>API Keys</h1><p>Manage your API keys</p></div>' +
    '<div class="card"><div class="card-header"><h3>Your Keys</h3><button class="btn btn-primary btn-sm" onclick="createKeyWithCap()">+ New Key</button></div>' +
    '<table><thead><tr><th>Name</th><th>Key</th><th>Monthly Cap</th><th>Status</th><th>Created</th><th></th></tr></thead>' +
    '<tbody id="keys-table"><tr><td colspan="6" style="text-align:center;color:var(--fg3);padding:2rem">Loading...</td></tr></tbody></table></div></div>';
}

async function loadKeys() {
  try {
    const data = await api('/v1/keys');
    STATE.keys = data.keys || [];
    const tbody = document.getElementById('keys-table');
    if (!STATE.keys.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--fg3);padding:2rem">No keys. Create one!</td></tr>'; return; }
    tbody.innerHTML = STATE.keys.map(k =>
      '<tr><td>' + k.name + '</td><td class="mono">' + k.key_prefix + '...</td>' +
      '<td>' + (k.monthly_cap ? k.monthly_cap.toLocaleString() + ' tokens' : '<span style="color:var(--fg3)">Unlimited</span>') + '</td>' +
      '<td><span class="tag ' + (k.active ? 'tag-active' : 'tag-revoked') + '">' + (k.active ? 'Active' : 'Revoked') + '</span></td>' +
      '<td class="mono">' + (k.created_at ? new Date(k.created_at).toLocaleDateString() : '') + '</td>' +
      '<td>' + (k.active ? '<button class="btn btn-danger btn-sm" onclick="revokeKey(\'' + k.id + '\')">Revoke</button>' : '') + '</td></tr>'
    ).join('');
  } catch (e) { document.getElementById('keys-table').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red)">Failed to load keys</td></tr>'; }
}

async function createKeyWithCap() {
  const name = prompt('Name for this key:');
  if (!name) return;
  const cap = prompt('Monthly token cap (leave empty for unlimited):');
  const monthlyCap = cap ? parseInt(cap, 10) : null;
  if (cap && (isNaN(monthlyCap) || monthlyCap <= 0)) { toast('Invalid cap', 'error'); return; }
  try {
    const d = await api('/v1/keys', { method: 'POST', body: JSON.stringify({ name, monthly_cap: monthlyCap || undefined }) });
    toast('Key created: ' + d.key, 'success');
    loadKeys();
  } catch (e) { toast(e.message, 'error'); }
}

async function revokeKey(id) {
  if (!confirm('Revoke this key?')) return;
  try { await api('/v1/keys/' + id, { method: 'DELETE' }); toast('Revoked', 'success'); loadKeys(); }
  catch (e) { toast(e.message, 'error'); }
}

function usage() {
  return '<div class="main"><div class="page-header"><h1>Usage</h1><p>Token usage and costs by provider</p></div>' +
    '<div class="stats-grid"><div class="stat-card"><div class="label">Prompt Tokens</div><div class="value" id="usage-pt">—</div></div>' +
    '<div class="stat-card"><div class="label">Completion Tokens</div><div class="value" id="usage-ct">—</div></div>' +
    '<div class="stat-card"><div class="label">Total Cost</div><div class="value" id="usage-cost">—</div></div></div>' +
    '<div class="card"><h3>By Provider</h3><table><thead><tr><th>Provider</th><th>Tokens</th><th>Cost</th></tr></thead>' +
    '<tbody id="usage-providers"><tr><td colspan="3" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</td></tr></tbody></table></div></div>';
}

async function loadUsage() {
  try {
    const data = await api('/v1/usage');
    const sum = data.summary || {};
    document.getElementById('usage-pt').textContent = (sum.total_prompt_tokens || 0).toLocaleString();
    document.getElementById('usage-ct').textContent = (sum.total_completion_tokens || 0).toLocaleString();
    document.getElementById('usage-cost').textContent = '$' + (sum.total_cost || 0).toFixed(4);

    const tbody = document.getElementById('usage-providers');
    const providers = data.by_provider || [];
    if (!providers.length) {
      tbody.innerHTML = '<tr><td colspan="3" style="color:var(--fg3);text-align:center;padding:1rem">No data yet</td></tr>';
      return;
    }
    tbody.innerHTML = providers.map((p: any) =>
      '<tr><td>' + p.provider + '</td><td>' + ((p.total_prompt_tokens || 0) + (p.total_completion_tokens || 0)).toLocaleString() + '</td>' +
      '<td>$' + (p.total_cost || 0).toFixed(4) + '</td></tr>'
    ).join('');
  } catch (e) {
    document.getElementById('usage-pt').textContent = '?';
    document.getElementById('usage-ct').textContent = '?';
    document.getElementById('usage-cost').textContent = '?';
  }
}

function billing() {
  const tiers = ['free', 'pro', 'enterprise'];
  const prices = ['$0', '$10/mo', '$100/mo'];
  const limits = ['100K tokens', '5M tokens', 'Unlimited'];
  const cls = ['tag-free', 'tag-pro', 'tag-enterprise'];
  return '<div class="main"><div class="page-header"><h1>Billing</h1><p>Manage subscription</p></div>' +
    '<div class="plans-grid">' + tiers.map((t, i) =>
      '<div class="card" style="' + (STATE.user.tier === t ? 'border-color:var(--accent)' : '') + '">' +
      '<h3>' + t.charAt(0).toUpperCase() + t.slice(1) + '</h3>' +
      '<div style="font-size:2rem;font-weight:700;font-family:JetBrains Mono">' + prices[i] + '</div>' +
      '<p style="color:var(--fg2);margin:.5rem 0">' + limits[i] + '/month</p>' +
      (STATE.user.tier === t ? '<span class="tag ' + cls[i] + '">Current</span>' :
        '<button class="btn btn-primary btn-sm" onclick="upgrade(\'' + t + '\')">' + (t === 'free' ? 'Downgrade' : 'Upgrade') + '</button>') +
      '</div>'
    ).join('') + '</div><div class="card"><h3>Billing History</h3><p style="color:var(--fg2);font-size:.85rem">No invoices yet</p></div></div>';
}

async function upgrade(tier) {
  try { const d = await api('/v1/billing/checkout', { method: 'POST', body: JSON.stringify({ tier }) }); toast(d.message || 'Upgraded', 'success'); }
  catch (e) { toast(e.message, 'error'); }
}

function settings() {
  return '<div class="main"><div class="page-header"><h1>Settings</h1><p>Account settings</p></div>' +
    '<div class="card"><div class="form-group"><label>Email</label><input value="' + STATE.user.email + '" disabled></div>' +
    '<div class="form-group"><label>API Token</label><input value="' + STATE.token + '" readonly onclick="this.select()"></div></div>' +
    '<button class="btn btn-danger" onclick="logout()">Sign Out</button></div>';
}

function projects() {
  return '<div class="main"><div class="page-header"><h1>Projects</h1><p>Organize API keys into projects</p></div>' +
    '<button class="btn btn-primary btn-sm" onclick="createProject()" style="margin-bottom:1rem">+ New Project</button>' +
    '<div class="card"><table><thead><tr><th>Name</th><th>Description</th><th>Keys</th><th>Monthly Tokens</th><th>Created</th><th></th></tr></thead>' +
    '<tbody id="projects-table"><tr><td colspan="6" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</td></tr></tbody></table></div></div>';
}

async function loadProjects() {
  try {
    const data = await api('/v1/projects');
    const tbody = document.getElementById('projects-table');
    const list = data.projects || [];
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="6" style="color:var(--fg3);text-align:center;padding:1rem">No projects. Create one!</td></tr>'; return; }
    tbody.innerHTML = list.map(p =>
      '<tr><td><strong>' + esc(p.name) + '</strong></td><td style="color:var(--fg2)">' + esc(p.description || '—') + '</td>' +
      '<td>' + p.key_count + '</td><td>' + (p.monthly_tokens || 0).toLocaleString() + '</td>' +
      '<td style="color:var(--fg2)">' + (p.created_at ? new Date(p.created_at).toLocaleDateString() : '') + '</td>' +
      '<td><button class="btn btn-danger btn-sm" onclick="deleteProject(\'' + p.id + '\')">Delete</button></td></tr>'
    ).join('');
  } catch { document.getElementById('projects-table').innerHTML = '<tr><td colspan="6" style="color:var(--red);text-align:center">Failed</td></tr>'; }
}

async function createProject() {
  const name = prompt('Project name:');
  if (!name) return;
  const desc = prompt('Description (optional):') || '';
  try {
    await api('/v1/projects', { method: 'POST', body: JSON.stringify({ name, description: desc }) });
    toast('Project created', 'success');
    loadProjects();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteProject(id) {
  if (!confirm('Delete this project? Keys will be unlinked but not revoked.')) return;
  try {
    await api('/v1/projects/' + id, { method: 'DELETE' });
    toast('Deleted', 'success');
    loadProjects();
  } catch (e) { toast(e.message, 'error'); }
}

function orgs() {
  return '<div class="main"><div class="page-header"><h1>Organizations</h1><p>Multi-tenant team management</p></div>' +
    '<button class="btn btn-primary btn-sm" onclick="createOrg()" style="margin-bottom:1rem">+ New Organization</button>' +
    '<div class="card" id="orgs-container"><div id="orgs-list" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</div></div>' +
    '<div id="org-detail" style="display:none"></div></div>';
}

async function loadOrgs() {
  try {
    const data = await api('/v1/orgs');
    const owned = data.owned || [];
    const member = data.member || [];
    const el = document.getElementById('orgs-list');
    if (!owned.length && !member.length) {
      el.innerHTML = 'No organizations. Create one to get started.';
      return;
    }
    el.innerHTML = '';
    if (owned.length) {
      el.innerHTML += '<h3 style="margin:.5rem 0;color:var(--fg2);font-size:.85rem">OWNED</h3>';
      owned.forEach(o => {
        el.innerHTML += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem;border-bottom:1px solid var(--line);cursor:pointer" onclick="showOrg(\'' + o.id + '\')">' +
          '<div><strong>' + esc(o.name) + '</strong><br><span style="font-size:.8rem;color:var(--fg2)">' + new Date(o.created_at).toLocaleDateString() + '</span></div>' +
          '<div><span class="tag tag-enterprise">Owner</span></div></div>';
      });
    }
    if (member.length) {
      el.innerHTML += '<h3 style="margin:.5rem 0;margin-top:1rem;color:var(--fg2);font-size:.85rem">MEMBER</h3>';
      member.forEach(o => {
        el.innerHTML += '<div style="display:flex;justify-content:space-between;align-items:center;padding:.75rem;border-bottom:1px solid var(--line);cursor:pointer" onclick="showOrg(\'' + o.id + '\')">' +
          '<div><strong>' + esc(o.name) + '</strong><br><span style="font-size:.8rem;color:var(--fg2)">' + new Date(o.created_at).toLocaleDateString() + ' · Role: ' + o.role + '</span></div>' +
          '<div><span class="tag tag-' + (o.role === 'admin' ? 'pro' : 'free') + '">' + o.role.toUpperCase() + '</span></div></div>';
      });
    }
  } catch { document.getElementById('orgs-list').textContent = 'Failed to load'; }
}

async function createOrg() {
  const name = prompt('Organization name:');
  if (!name) return;
  try {
    await api('/v1/orgs', { method: 'POST', body: JSON.stringify({ name }) });
    toast('Organization created', 'success');
    loadOrgs();
  } catch (e) { toast(e.message, 'error'); }
}

let selectedOrgId = null;

async function showOrg(orgId) {
  selectedOrgId = orgId;
  try {
    const orgData = await api('/v1/orgs/' + orgId);
    const membersData = await api('/v1/orgs/' + orgId + '/members');
    const org = orgData.org;
    const members = membersData.members || [];
    const isOwner = org.my_role === 'owner' || org.my_role === 'admin';
    const el = document.getElementById('org-detail');
    el.style.display = 'block';
    el.innerHTML =
      '<div class="card" style="margin-top:1rem">' +
      '<div class="card-header"><h3>' + esc(org.name) + '</h3>' +
      (org.my_role === 'owner' ? '<button class="btn btn-danger btn-sm" onclick="deleteOrgConfirm()">Delete Org</button>' : '') +
      '</div>' +
      '<p style="color:var(--fg2);font-size:.85rem">ID: ' + esc(org.id) + ' · Members: ' + org.member_count + ' · Your role: <span class="tag tag-enterprise">' + org.my_role.toUpperCase() + '</span></p>' +
      (isOwner ? '<button class="btn btn-primary btn-sm" onclick="inviteMember()" style="margin:1rem 0">+ Invite Member</button>' : '') +
      '<table><thead><tr><th>Email</th><th>Role</th><th>Joined</th>' + (org.my_role === 'owner' ? '<th></th>' : '') + '</tr></thead><tbody>' +
      members.map(m =>
        '<tr><td>' + esc(m.email) + '</td>' +
        '<td><span class="tag tag-' + (m.role === 'owner' ? 'enterprise' : m.role === 'admin' ? 'pro' : 'free') + '">' + m.role.toUpperCase() + '</span></td>' +
        '<td style="color:var(--fg2)">' + (m.created_at ? new Date(m.created_at).toLocaleDateString() : '') + '</td>' +
        (org.my_role === 'owner' && m.role !== 'owner' ? '<td><button class="btn btn-danger btn-sm" onclick="removeMember(\'' + m.user_id + '\')">Remove</button></td>' : '') +
        '</tr>'
      ).join('') +
      '</tbody></table></div>';
    // Scroll to detail
    el.scrollIntoView({ behavior: 'smooth' });
  } catch { toast('Failed to load org details', 'error'); }
}

async function inviteMember() {
  const email = prompt('Email of user to invite:');
  if (!email) return;
  const roleInput = prompt('Role (admin / member / viewer):', 'member') || 'member';
  const r = roleInput.trim().toLowerCase();
  if (!['admin', 'member', 'viewer'].includes(r)) { toast('Invalid role — use: admin, member, or viewer', 'error'); return; }
  try {
    await api('/v1/orgs/' + selectedOrgId + '/members', { method: 'POST', body: JSON.stringify({ email, invite_role: r }) });
    toast('Invited ' + email + ' as ' + r, 'success');
    showOrg(selectedOrgId);
  } catch (e) { toast(e.message, 'error'); }
}

async function removeMember(userId) {
  if (!confirm('Remove this member?')) return;
  try {
    await api('/v1/orgs/' + selectedOrgId + '/members/' + userId, { method: 'DELETE' });
    toast('Removed', 'success');
    showOrg(selectedOrgId);
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteOrgConfirm() {
  if (!confirm('Delete this organization? All members will be removed.')) return;
  try {
    await api('/v1/orgs/' + selectedOrgId, { method: 'DELETE' });
    toast('Deleted', 'success');
    selectedOrgId = null;
    document.getElementById('org-detail').style.display = 'none';
    loadOrgs();
  } catch (e) { toast(e.message, 'error'); }
}

function admin() {
  if (STATE.user?.tier !== 'enterprise') return '<div class="main"><h1>Access Denied</h1></div>';
  return '<div class="main"><div class="page-header"><h1>Admin</h1><p>System management</p></div>' +
    '<div class="stats-grid"><div class="stat-card"><div class="label">Active (24h)</div><div class="value" id="admin-active" style="color:var(--accent)">—</div></div>' +
    '<div class="stat-card"><div class="label">Users</div><div class="value" id="admin-users" style="color:var(--accent2)">—</div></div>' +
    '<div class="stat-card"><div class="label">Total Events</div><div class="value" id="admin-events" style="color:var(--fg)">—</div></div></div>' +
    '<div class="card"><div class="card-header"><h3>Provider Keys</h3></div>' +
    '<table><thead><tr><th>Provider</th><th>Status</th><th></th></tr></thead><tbody id="admin-providers"><tr><td colspan="3" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</td></tr></tbody></table></div>' +
    '<div class="card"><div class="card-header"><h3>Users</h3></div>' +
    '<table><thead><tr><th>Email</th><th>Tier</th><th>Tokens</th><th>Keys</th><th>Created</th><th></th></tr></thead><tbody id="admin-users-table"><tr><td colspan="6" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</td></tr></tbody></table></div>' +
    '<div class="card"><div class="card-header"><h3>Version Distribution</h3></div>' +
    '<table><thead><tr><th>Version</th><th>Instances</th></tr></thead><tbody id="admin-versions"><tr><td colspan="2" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</td></tr></tbody></table></div></div>';
}

async function loadAdminStats() {
  try {
    const [s, u, pk] = await Promise.all([
      api('/v1/telemetry/stats'),
      api('/v1/admin/users'),
      api('/v1/admin/provider-keys'),
    ]);
    document.getElementById('admin-active').textContent = fmt(s.active_1d);
    document.getElementById('admin-users').textContent = fmt((u.users || []).length);
    document.getElementById('admin-events').textContent = fmt(s.total_events);

    // Provider keys
    const pt = document.getElementById('admin-providers');
    const providers = pk.providers || {};
    pt.innerHTML = Object.entries(providers).map(([name, set]) =>
      '<tr><td style="font-weight:600">' + name + '</td>' +
      '<td><span class="tag ' + (set ? 'tag-active' : 'tag-revoked') + '">' + (set ? 'Set' : 'Not set') + '</span></td>' +
      '<td>' + (set ? '' : '<button class="btn btn-primary btn-sm" onclick="setProviderKey(\'' + name + '\')">Set Key</button>') + '</td></tr>'
    ).join('');

    // Users table
    const ut = document.getElementById('admin-users-table');
    const users = u.users || [];
    ut.innerHTML = users.map(u2 =>
      '<tr><td>' + esc(u2.email) + '</td>' +
      '<td><span class="tag tag-' + u2.tier + '">' + u2.tier.toUpperCase() + '</span></td>' +
      '<td>' + fmt(u2.total_tokens_used || 0) + '</td>' +
      '<td>' + (u2.key_count || 0) + '</td>' +
      '<td style="color:var(--fg2);font-size:.8rem">' + (u2.created_at ? new Date(u2.created_at).toLocaleDateString() : '') + '</td>' +
      '<td>' + (u2.tier !== 'enterprise' ? '<button class="btn btn-sm" onclick="upgradeUser(\'' + u2.id + '\',\'' + u2.tier + '\')">Upgrade</button>' : '') + '</td></tr>'
    ).join('');

    // Versions
    const vt = document.getElementById('admin-versions');
    const versions = s.version_distribution || [];
    vt.innerHTML = versions.length ? versions.map(v => '<tr><td>' + esc(v.version) + '</td><td>' + fmt(v.count) + '</td></tr>').join('') : '<tr><td colspan="2" style="color:var(--fg3);text-align:center;padding:1rem">No instances</td></tr>';
  } catch {}
}

async function setProviderKey(provider) {
  const key = prompt('Enter API key for ' + provider + ':');
  if (!key) return;
  try {
    await api('/v1/admin/provider-keys', { method: 'POST', body: JSON.stringify({ provider, key }) });
    toast(provider + ' key set!', 'success');
    loadAdminStats();
  } catch (e) { toast(e.message, 'error'); }
}

async function upgradeUser(userId, currentTier) {
  const tiers = ['free', 'pro', 'enterprise'];
  const next = tiers.indexOf(currentTier) + 1;
  if (next >= tiers.length) { toast('Already at max tier', 'error'); return; }
  const newTier = tiers[next];
  if (!confirm('Upgrade user to ' + newTier + '?')) return;
  try {
    await api('/v1/admin/users/' + userId, { method: 'PATCH', body: JSON.stringify({ tier: newTier }) });
    toast('Upgraded to ' + newTier, 'success');
    loadAdminStats();
  } catch (e) { toast(e.message, 'error'); }
}

function instances() {
  return '<div class="main"><div class="page-header"><h1>Instances</h1><p>Active Clew Code clients</p></div>' +
    '<div class="card"><table><thead><tr><th>Version</th><th>Count</th></tr></thead>' +
    '<tbody id="instances-table"><tr><td colspan="2" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</td></tr></tbody></table></div></div>';
}

async function loadInstances() {
  try {
    const s = await api('/v1/telemetry/stats');
    const versions = s.version_distribution || [];
    const tbody = document.getElementById('instances-table');
    if (!versions.length) { tbody.innerHTML = '<tr><td colspan="2" style="color:var(--fg3);text-align:center;padding:1rem">No instances</td></tr>'; return; }
    tbody.innerHTML = versions.map(v => '<tr><td>' + esc(v.version) + '</td><td>' + fmt(v.count) + '</td></tr>').join('');
  } catch { document.getElementById('instances-table').innerHTML = '<tr><td colspan="2" style="color:var(--red);text-align:center">Failed</td></tr>'; }
}

function events() {
  return '<div class="main"><div class="page-header"><h1>Events</h1><p>Telemetry events (7 days)</p></div>' +
    '<div class="card"><table><thead><tr><th>Event</th><th>Count</th></tr></thead>' +
    '<tbody id="events-table"><tr><td colspan="2" style="color:var(--fg3);text-align:center;padding:1rem">Loading...</td></tr></tbody></table></div></div>';
}

async function loadEvents() {
  try {
    const s = await api('/v1/telemetry/stats');
    const rows = s.top_events_7d || [];
    const tbody = document.getElementById('events-table');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="2" style="color:var(--fg3);text-align:center;padding:1rem">No events</td></tr>'; return; }
    tbody.innerHTML = rows.map(e => '<tr><td>' + esc(e.event) + '</td><td>' + fmt(e.count) + '</td></tr>').join('');
  } catch { document.getElementById('events-table').innerHTML = '<tr><td colspan="2" style="color:var(--red);text-align:center">Failed</td></tr>'; }
}

function fmt(n) { return Number(n || 0).toLocaleString(); }
function esc(s) { return String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }

function logout() {
  STATE.token = null; STATE.user = null; localStorage.removeItem('clew_session_token');
  location.hash = 'login'; render();
}

window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
