<!DOCTYPE html>
<html>
<head><title>Clew API — Login</title>
<style>
body { font-family: Inter, sans-serif; background: #0a0a0f; color: #e4e4e7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.box { background: #12121a; border: 1px solid #27272a; border-radius: 10px; padding: 2.5rem; width: 380px; }
h2 { text-align: center; margin: 0 0 1.5rem; font-family: JetBrains Mono; color: #a855f7; }
input { width: 100%; padding: .6rem .75rem; background: #0a0a0f; border: 1px solid #27272a; border-radius: 6px; color: #e4e4e7; font-size: .9rem; outline: none; margin-bottom: .75rem; box-sizing: border-box; }
input:focus { border-color: #a855f7; }
.btn { width: 100%; padding: .6rem; background: #a855f7; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; font-size: .9rem; }
.btn:hover { background: #9333ea; }
.err { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #ef4444; padding: .75rem; border-radius: 6px; font-size: .85rem; margin-bottom: 1rem; display: none; }
p { text-align: center; font-size: .85rem; color: #a1a1aa; margin-top: 1rem; }
a { color: #a855f7; cursor: pointer; }
</style></head>
<body>
<div class="box">
  <h2>clew<span style="color:#e4e4e7">api</span></h2>
  <div class="err" id="err"></div>
  <input type="email" id="email" placeholder="Email" value="admin@clew.dev">
  <input type="password" id="password" placeholder="Password" value="admin123456789">
  <button class="btn" id="btn" onclick="login()">Sign In</button>
  <p id="status"></p>
</div>
<script>
async function login() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Loading...';
  try {
    const r = await fetch('https://api.clew-code.org/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    localStorage.setItem('clew_session_token', d.token);
    window.location.href = '/app/';
  } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Sign In';
}
</script>
</body>
</html>
